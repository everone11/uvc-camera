apply plugin: 'com.android.application'

android {
    compileSdkVersion 33

    defaultConfig {
        applicationId "com.everone11.uvccamera.xposed"
        minSdkVersion 16
        targetSdkVersion 33
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    // Xposed API 作为 compileOnly（或把 xposed-api.jar 放到 libs 并作为 provided）
    compileOnly 'de.robv.android.xposed:api:82'
}
