name: Android Build (assembleRelease)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set ANDROID_SDK_ROOT
        run: echo "ANDROID_SDK_ROOT=${{ runner.temp }}/android-sdk" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Prepare Android SDK (commandline-tools)
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          cd $ANDROID_SDK_ROOT
          curl -sSLo cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q cmdline-tools.zip -d cmdline-tools
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools/latest
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools/* $ANDROID_SDK_ROOT/cmdline-tools/latest/ || true
          rm -f cmdline-tools.zip

      - name: Add SDK tools to GITHUB_PATH
        run: |
          # 这是向 PATH 追加路径的官方推荐做法，不会破坏系统原生命令
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

      - name: Accept licenses
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager --list
          
      - name: Install Android platforms and build-tools
        run: |
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"
          sdkmanager "platforms;android-29" "build-tools;29.0.3"
          
      - name: Ensure gradlew is executable
        run: |
          if [ -f ./gradlew ]; then chmod +x ./gradlew; fi
          
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: "${{ runner.os }}-gradle-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties') }}-${{ hashFiles('**/*.gradle*', '**/gradle.properties') }}"
          restore-keys: |
            ${{ runner.os }}-gradle-
            
      - name: Build (assembleRelease)
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace
